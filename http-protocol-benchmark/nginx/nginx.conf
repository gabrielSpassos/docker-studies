events {}

http {
    upstream backend {
        server backend:5000;
    }

    # HTTP/1.1
    server {
        listen 8080;

        location / {
            proxy_pass http://backend;
        }
    }

    # HTTP/2
    server {
        listen 8443 ssl http2;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            proxy_pass http://backend;
        }
    }

    # HTTP/3 (QUIC)
    server {
        listen 8444 quic reuseport;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            proxy_pass http://backend;
        }
    }
}