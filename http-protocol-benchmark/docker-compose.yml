version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "8080:8080"
      - "8443:8443"
      - "8444:8444/udp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - backend